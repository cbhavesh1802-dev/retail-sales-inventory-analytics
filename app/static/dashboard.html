<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADG Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0f1117; color:#e6e6e6; padding:32px; min-height:100vh; }
  .header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .header h1 { font-size:24px; font-weight:600; }
  .badge { background:#16213e; color:#5b9dff; padding:3px 10px; border-radius:20px; font-size:12px; }
  .subtitle { color:#888; font-size:13px; margin-bottom:28px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat { background:#171a23; border:1px solid #232735; border-radius:12px; padding:18px; }
  .stat .label { font-size:12px; color:#888; margin-bottom:6px; }
  .stat .value { font-size:28px; font-weight:700; }
  .stat .value.green { color:#4ade80; }
  .stat .value.blue { color:#5b9dff; }
  .stat .value.amber { color:#fbbf24; }
  table { width:100%; border-collapse:collapse; background:#171a23; border-radius:12px; overflow:hidden; border:1px solid #232735; }
  th { text-align:left; padding:14px 16px; font-size:12px; color:#888; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #232735; }
  td { padding:14px 16px; font-size:14px; border-bottom:1px solid #1d212c; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#1c2029; }
  .decision { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; display:inline-block; }
  .APPROVE { background:#0f2e1a; color:#4ade80; }
  .APPROVE_WITH_CONDITIONS { background:#2e2410; color:#fbbf24; }
  .REVIEW_REQUIRED { background:#2e2410; color:#fb923c; }
  .BLOCK_DEPLOYMENT { background:#2e1414; color:#f87171; }
  .score-bar { display:flex; align-items:center; gap:8px; }
  .bar-track { width:80px; height:6px; background:#232735; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:3px; }
  .repo-name { color:#5b9dff; font-size:13px; }
  .pr-title { color:#bbb; font-size:13px; }
  .time { color:#666; font-size:12px; }
  .empty { text-align:center; padding:60px; color:#666; }
  .refresh { float:right; background:#16213e; color:#5b9dff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; }
  .refresh:hover { background:#1d2b4d; }
  .footer { text-align:center; color:#444; font-size:12px; margin-top:24px; }
</style>
</head>
<body>
  <div class="header">
    <h1>🛡️ ADG Dashboard</h1>
    <span class="badge">Autonomous DevSecOps Guardian</span>
    <button class="refresh" onclick="load()">↻ Refresh</button>
  </div>
  <div class="subtitle">Real-time deployment trust scores across all repositories</div>
  <div class="stats" id="stats"></div>
  <table>
    <thead><tr><th>Repository</th><th>PR</th><th>Trust Score</th><th>Decision</th><th>Evaluated</th></tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
  </table>
  <div class="footer">ADG v0.2 · Powered by FastAPI + PostgreSQL</div>
<script>
function barColor(s){if(s>=85)return'#4ade80';if(s>=60)return'#fbbf24';if(s>=30)return'#fb923c';return'#f87171';}
function timeAgo(iso){const d=new Date(iso);const diff=Math.floor((Date.now()-d.getTime())/60000);if(diff<1)return'just now';if(diff<60)return diff+'m ago';if(diff<1440)return Math.floor(diff/60)+'h ago';return Math.floor(diff/1440)+'d ago';}
async function load(){
  try{
    const res=await fetch('/api/evaluations');
    const data=await res.json();
    const total=data.length;
    const approvals=data.filter(d=>d.decision==='APPROVE').length;
    const blocks=data.filter(d=>d.decision==='BLOCK_DEPLOYMENT').length;
    const avg=total?Math.round(data.reduce((s,d)=>s+d.trust_score,0)/total):0;
    document.getElementById('stats').innerHTML=`
      <div class="stat"><div class="label">Total Evaluations</div><div class="value blue">${total}</div></div>
      <div class="stat"><div class="label">Approved</div><div class="value green">${approvals}</div></div>
      <div class="stat"><div class="label">Blocked</div><div class="value amber">${blocks}</div></div>
      <div class="stat"><div class="label">Avg Trust Score</div><div class="value">${avg}</div></div>`;
    if(!data.length){document.getElementById('rows').innerHTML='<tr><td colspan="5" class="empty">No evaluations yet. Open a PR to see ADG in action!</td></tr>';return;}
    document.getElementById('rows').innerHTML=data.map(d=>`
      <tr>
        <td><span class="repo-name">${d.repo}</span></td>
        <td>#${d.pr_number} <span class="pr-title">${d.pr_title||''}</span></td>
        <td><div class="score-bar"><div class="bar-track"><div class="bar-fill" style="width:${d.trust_score}%;background:${barColor(d.trust_score)}"></div></div><span>${d.trust_score}/100</span></div></td>
        <td><span class="decision ${d.decision}">${d.decision.replace(/_/g,' ')}</span></td>
        <td><span class="time">${timeAgo(d.evaluated_at)}</span></td>
      </tr>`).join('');
  }catch(e){document.getElementById('rows').innerHTML='<tr><td colspan="5" class="empty">Error: '+e.message+'</td></tr>';}
}
load();
setInterval(load,10000);
</script>
</body>
</html>
